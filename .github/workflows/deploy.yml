name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd ~/app/auth

            # Sauvegarde DB avant tout déploiement
            mkdir -p ~/backups
            docker exec auth-postgres-1 pg_dump -U postgres rev0auth \
              > ~/backups/rev0auth_$(date +%Y%m%d_%H%M%S).sql
            # Garde les 10 derniers backups, supprime les plus anciens
            ls -t ~/backups/rev0auth_*.sql | tail -n +11 | xargs -r rm

            git pull origin main
            docker compose up -d --no-deps --build --force-recreate api web
