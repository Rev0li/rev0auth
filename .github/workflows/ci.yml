name: CI

on:
  push:
    branches: [main, dev/svelte]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (svelte-check + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test
