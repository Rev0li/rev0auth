services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
      - .secrets
    environment:
      POSTGRES_DB: rev0auth
      POSTGRES_USER: postgres
      # POSTGRES_PASSWORD injecté depuis .secrets
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rev0auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
      - .secrets
    # DATABASE_URL et AUTH_JWT_SECRET injectés depuis .secrets
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - .env
      - .secrets
    environment:
      # Valeurs statiques — pas de secrets ici
      REV0AUTH_API_UPSTREAM: api:8080
      WEB_BIND_ADDR: 0.0.0.0:3000
    # Toutes les autres vars (AUTH_JWT_SECRET, ADMIN_*, WEBAUTHN_*, SONGSURF_URL…)
    # sont chargées depuis .env + .secrets via env_file
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  pgdata:
